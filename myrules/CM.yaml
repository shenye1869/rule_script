# ==================== 锚点配置 ====================
# 代理提供者模板 - 订阅源基础配置
BaseProvider: &BaseProvider {type: http, interval: 86400, proxy: DIRECT, health-check: {enable: true, url: 'https://www.google.com/generate_204', interval: 300}}
pf: &pf {use: [ 机场A,机场B]}
pt: &pt {use: [ 机场B,机场C]}
ps: &ps {use: [ 机场A,机场C]}
pp: &pp {use: [ 机场A,机场B,机场C]}
p1: &p1 {use: [ 机场A ]}
p2: &p2 {use: [ 机场B ]}
p3: &p3 {use: [ 机场C]}

# 策略组类型模板 - 定义不同的策略组基础配置
UrlTest: &UrlTest {type: url-test, interval: 60, tolerance: 20, lazy: true, url: 'https://www.gstatic.com/generate_204', disable-udp: false, timeout: 90, max-failed-times: 3}
FallBack: &FallBack {type: fallback, interval: 60, lazy: true, url: 'https://www.gstatic.com/generate_204', disable-udp: false, timeout: 90, max-failed-times: 3}
LoadCH: &LoadCH {type: load-balance, interval: 60, lazy: true, url: 'https://www.gstatic.com/generate_204', disable-udp: false, strategy: consistent-hashing, timeout: 90, max-failed-times: 3}
LoadCR: &LoadCR {type: load-balance, interval: 60, lazy: true, url: 'https://www.gstatic.com/generate_204', disable-udp: false, strategy: round-robin, timeout: 90, max-failed-times: 3}
BaseSmart: &BaseSmart {type: smart, interval: 60, lazy: true, url: 'https://www.google.com/generate_204', hidden: true, uselightgbm: true}

