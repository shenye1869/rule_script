- {name: 智能次选, <<: [*BaseSmart, *p2], filter: '.*(香港|新加坡|日本).*', policy-priority: '.*香港.*:2; .*新加坡.*:1; .*日本.*:0.5',  hidden: true}
- {name: 智能备选, <<: [*BaseSmart, *pp], filter: '(?:^\[优\](?!.*(?:HK|JP|SG)).*)|(?:^\[次\](?!.*(?:香港|新加坡|日本)).*)|(?:^\[备\].*)', policy-priority: '次:5;优:1;备:0.1',  hidden: true}
- {name: 负载均衡, <<: [*LoadCR,  *pp], ffilter: *FilterAL,  hidden: true}  

